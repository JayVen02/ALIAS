services:
  web:
    build: ./app
    ports:
      - "5000:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - MYSQL_HOST=database
      - MYSQL_USER=root
      - MYSQL_PASSWORD=alias_secret
      - MYSQL_DB=alias_db
    depends_on:
      - database

  database:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=alias_secret
      - MYSQL_DATABASE=alias_db