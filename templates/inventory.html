{% extends 'base.html' %}

{% block content %}
<div class="page-header-container">
    <div class="page-header-content">
        <div class="page-header-title">
            <h1>INVENTORY</h1>
            <p class="welcome-msg">Welcome, <em>{{ session['username'] }}!</em></p>
        </div>
        <div class="header-logo-container">
            <img src="https://res.cloudinary.com/dvblizd3z/image/upload/v1773499759/Alubijid%20Local%20Inventory%20and%20Audit%20System%20%28ALIAS%29/Logo_bpla9k.png" alt="ALIAS">
            <p class="header-logo-text">ALUBIJID LOCAL INVENTORY<br>AND AUDIT SYSTEM</p>
        </div>
    </div>
</div>

<div class="inventory-content" style="padding: 0 2rem 2rem;">
    <!-- Top Toolbar -->
    <div class="toolbar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <button class="btn-primary" id="btnCreateNew" style="padding: 0.6rem 2rem; border-radius: 20px;">Create New Item</button>
        <div class="select-wrapper">
            <select id="sortSelect">
                <option value="latest">Sort By: Latest Update</option>
                <option value="oldest">Sort By: Oldest Update</option>
                <option value="name">Sort By: Name (A-Z)</option>
                <option value="qty_high">Sort By: Quantity (High-Low)</option>
                <option value="qty_low">Sort By: Quantity (Low-High)</option>
            </select>
        </div>
    </div>

    <!-- Search Bar -->
    <div class="search-wrapper">
        <input type="text" id="searchInput" placeholder="Search for list">
    </div>

    <!-- Category Navigator -->
    <div class="category-nav">
        <button id="catPrev">&lt;</button>
        <span id="catLabel">Category</span>
        <button id="catNext">&gt;</button>
    </div>

    <!-- Hidden element for subcategories (handled by JS) -->
    <div id="subcategoryTabs" style="display: none;"></div>

    <div class="data-table-container">
        <table class="data-table" id="inventoryTable">
            <thead>
                <tr>
                    <th>CATEGORY</th>
                    <th>SUBCATEGORY</th>
                    <th>ITEM NAME</th>
                    <th>DATE CREATED</th>
                    <th>DATE UPDATED</th>
                    <th>QUANTITY</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="inventoryBody">
                <!-- Data loaded via inventory.js -->
            </tbody>
        </table>
    </div>
</div>

<!-- Modals & Toasts -->
<div id="createModal" class="modal hidden">
    <div class="modal-content">
        <h2 style="color: var(--primary-navy); margin-bottom: 1.5rem; text-align: center;">CREATE NEW ITEM</h2>
        <div class="modal-form">
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                <select id="createCategory" class="modal-input" style="flex: 2;"></select>
                <select id="createSubcategory" class="modal-input" style="flex: 2;"></select>
                <input type="number" id="createQuantity" placeholder="Qty" class="modal-input" style="flex: 1;">
            </div>
            <input type="text" id="createName" placeholder="Item Name" class="modal-input" style="width: 100%; margin-bottom: 1.5rem;">
            <div style="display: flex; justify-content: center; gap: 1rem;">
                <button class="btn-back" id="createBack" style="background: var(--text-muted); color: white; padding: 0.8rem 2.5rem; border-radius: 25px;">BACK</button>
                <button class="btn-save" id="createNext" style="background: var(--primary-navy); color: white; padding: 0.8rem 2.5rem; border-radius: 25px;">CREATE</button>
            </div>
        </div>
    </div>
</div>

<div id="deleteModal" class="modal hidden">
    <div class="modal-content" style="max-width: 400px; text-align: center;">
        <h2 style="color: #e74c3c; margin-bottom: 1rem;">Delete Item?</h2>
        <p id="deleteMsg" style="margin-bottom: 2rem; color: var(--text-muted);"></p>
        <div style="display: flex; justify-content: center; gap: 1rem;">
            <button class="btn-back" id="deleteCancelBtn">Cancel</button>
            <button class="btn-save" id="deleteConfirmBtn" style="background: #e74c3c;">Delete</button>
        </div>
    </div>
</div>

<div id="toast" class="toast hidden"></div>

<style>
    .toast {
        position: fixed; bottom: 20px; right: 20px; padding: 1rem 2rem; border-radius: 10px; color: white; z-index: 1000; font-weight: 700; transition: all 0.3s ease;
    }
    .toast.success { background-color: var(--success); }
    .toast.error { background-color: #e74c3c; }
</style>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/inventory.js') }}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        if (window.initInventory) window.initInventory();
    });
</script>
{% endblock %}
